<!DOCTYPE html>

<html>

<head>

<title>Co-Links Login</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="loginBox">


<h1>🐦 Co-Links </h1>

<h2>Login</h2>


<input 
id="email"
placeholder="Email">


<input 
id="password"
type="password"
placeholder="Password">


<button onclick="login()">

Login

</button>


<p>

New user?

<a href="register.html">
Register
</a>

</p>


</div>



<script>


function login(){


let user={

email:
document.getElementById("email").value,


password:
document.getElementById("password").value

};



fetch(
"http://localhost:8081/api/users/login",

{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:
JSON.stringify(user)

}

)


.then(res=>res.text())


.then(data=>{


if(data==="Login Success"){


localStorage.setItem(
"user",
user.email
);


window.location="index.html";


}

else{

alert("Wrong login");

}


});


}


</script>


</body>


</html>
